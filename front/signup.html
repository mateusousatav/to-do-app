<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="styles.css" rel="stylesheet">
        <link href="signup.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kotta+One&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        <title>Signup</title>
    </head>
    <body>
        <header id="navbar">
            <img id="logo" src="/assets/logo.png" alt="Tik-it logo"/>
            <div id="links-div">
                <a href="signup.html" class="logout">Sign-Up</a>
                <a href="login.html" class="logout">Log-In</a>
                <a href="settings.html" class="logout">Settings</a>
            </div>
        </header>

        <div id="homeContainer">
            <div id="homeHalf1">
                <h1>Welcome!<br>This is your Tik-It© to Success!</h1>
                
            </div>
            <hr>
            <div id="homeHalf2">
                <div class="form_card" id="signup_card">
                    <h2>Sign Up</h2>
                    <form id="signupForm">
                        <div class="formSections">
                            <label>Email</label>
                            <input id="email" type="email" required>
                        </div>
                        <div class="formSections">
                            <label>Password</label>
                            <input id="password" type="password" required>
                        </div>
                        <button type="submit">Sign Up</button>
                    </form>
                    <p class="authSwitch">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: center;">
            <button id="darkToggle">Toggle Dark Mode</button>
        </div>
        <script type="module" src="/back/signup.js"></script>
        <script type="module" src="/back/settings.js"></script>
    </body>
</html>
