<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="styles.css" rel="stylesheet">
        <link href="signup.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kotta+One&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        <title>Signup</title>
    </head>
    <body>
        <div id="homeContainer">
            <div id="homeHalf1">
                <h1>Welcome!<br>Let's get stuff done.</h1>
                <p id="quote">
                “Tony Stark built this in a cave with nothing but scraps”
                <br>
                – Not a good guy
                </p>
            </div>
            <hr>
            <div id="homeHalf2">
                <div class="form_card" id="signup_card">
                    <h2>Signup</h2>
                    <form id="signupForm">
                        <div class="formSections">
                            <label>Email</label>
                            <input type="email" required>
                        </div>
                        <div class="formSections">
                            <label>Password</label>
                            <input type="password" required>
                        </div>
                        <button type="submit">Sign Up</button>
                    </form>
                    <p class="authSwitch">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
