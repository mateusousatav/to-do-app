<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="home.css">
        <link rel="stylesheet" href="completed.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Kotta+One&display=swap" rel="stylesheet">
        <title>Completed Tasks</title>

    <body>
        <header id="navbar">
            <img id="logo" src="/assets/logo.png" alt="Tik-it logo"/>
            <div id="links-div">

        <script type="module" src="/back/completed.js"></script>
