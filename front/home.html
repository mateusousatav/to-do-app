<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kotta+One&display=swap" rel="stylesheet">
    <title>Home</title>
</head>
<body>
    <div id="homeContainer">
        <div id="homeHalf1">
            <h1>Welcome</h1>
        </div>
        <div id="homeHalf2">
            <div class="form_container">
                <h2> Signup </h2>
                <form id="signupForm">
                    <label for="usernm">Username:</label><br>
                    <input type="text" id="usernm" name="username" required><br>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" required><br>
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" name="password" required><br><br>
                    <button type="submit" id="signup" class="black_button">Sign Up</button>
                </form>
                <p> Already have an account? <a href="login.html"> Login </a></p>
            </div>
        </div>
    </div>
</body>
</html>
