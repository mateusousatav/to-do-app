    <div id="homeContainer">

                <h2> Signup </h2>
                <form id="signupForm">
                    <div class="formSections">
                        <label for="email">Email:</label><br>
                        <input type="email" id="email" name="email" required><br>

                    <div class="formSections">
                        <label for="password">Password:</label><br>

            </div>
        </div>
