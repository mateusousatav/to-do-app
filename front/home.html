<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="home.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Kotta+One&display=swap" rel="stylesheet">
        <title>To-Do</title>
    </head>

    <body>
        <header id="navbar">
            <h1 id="logo">To-Do</h1>
            <a href="login.html" id="logout">Log out</a>
        </header>

        <main id="dashboard">
            <div class="taskCard">
                <h2>Your Tasks:</h2>
                <ul class="taskList">
                    <div class="list">
                        <li>Placeholder</li>
                        <button class="listButton">✓</button>
                        <p>Due Date: </p>
                    </div>
                    <div class="list">
                        <li>Placeholder</li>
                        <button class="listButton">✓</button>
                        <p>Due Date: </p>
                    </div>
                    <div class="list">
                        <li>Placeholder</li>
                        <button class="listButton">✓</button>
                        <p>Due Date: </p>
                    </div>
                    <div class="list">
                        <li>Placeholder</li>
                        <button class="listButton">✓</button>
                        <p>Due Date: </p>
                    </div>
                </ul>
                <a class="completedLink">View Completed Tasks</a>
                <button class="secondaryBtn">Complete All</button>
            </div>

            <div class="taskCard addTask">
                <h2>Enter a New Task</h2>
                <input id="task" type="text" placeholder="Type your task...">
                <input id="dueDate" type="text" placeholder="Due Date...">
                <img src="/assets/plant.png" alt="plant sprout">
                <button>GO</button>
            </div>
        </main>
    </body>
</html>
